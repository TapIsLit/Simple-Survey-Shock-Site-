<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Survey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            transition: all 0.8s ease;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.8s ease, filter 0.8s ease;
            position: fixed;
            top: 0;
            left: 0;
        }

        .survey-wrapper {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            width: 85vw;
            height: auto;
            max-height: 85vh;
            animation: slideIn 0.6s ease;
            transition: all 0.8s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 100;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glitch {
            0% {
                transform: translate(0);
                filter: brightness(1);
            }
            25% {
                transform: translate(-4px, 3px);
                filter: brightness(0.8);
            }
            50% {
                transform: translate(4px, -3px);
                filter: brightness(1.2);
            }
            75% {
                transform: translate(-3px, -4px);
                filter: brightness(0.9);
            }
            100% {
                transform: translate(0);
                filter: brightness(1);
            }
        }

        @keyframes screenShake {
            0%, 100% {
                transform: translate(0, 0);
            }
            10% {
                transform: translate(-5px, -5px);
            }
            20% {
                transform: translate(5px, 5px);
            }
            30% {
                transform: translate(-5px, 5px);
            }
            40% {
                transform: translate(5px, -5px);
            }
            50% {
                transform: translate(-3px, -3px);
            }
            60% {
                transform: translate(3px, 3px);
            }
            70% {
                transform: translate(-4px, 4px);
            }
            80% {
                transform: translate(4px, -4px);
            }
            90% {
                transform: translate(-2px, 2px);
            }
        }

        @keyframes distortion {
            0%, 100% {
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
            }
            20% {
                clip-path: polygon(0% 2%, 100% 0%, 100% 98%, 0% 100%);
            }
            40% {
                clip-path: polygon(0% 0%, 100% 3%, 100% 100%, 0% 97%);
            }
            60% {
                clip-path: polygon(0% 4%, 100% 1%, 100% 96%, 0% 99%);
            }
            80% {
                clip-path: polygon(0% 1%, 100% 2%, 100% 99%, 0% 98%);
            }
        }

        /* STAGE 0 - CUTE */
        body.stage-0 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .container.stage-0 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .survey-wrapper.stage-0 {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 8px 32px rgba(252, 182, 159, 0.3);
            border: 3px solid #ffb3d9;
        }

        .survey-wrapper.stage-0 h1 {
            color: #ff69b4;
            font-size: clamp(2em, 6vw, 3em);
            margin-bottom: 10px;
        }

        .survey-wrapper.stage-0 .credits {
            color: #ff85c0;
            font-size: clamp(0.7em, 1.5vw, 0.9em);
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .survey-wrapper.stage-0 p {
            color: #ff85c0;
            font-size: clamp(1em, 2.5vw, 1.3em);
            margin-bottom: 30px;
        }

        .option.stage-0 {
            background: linear-gradient(135deg, #ffb3d9 0%, #ffc0e0 100%);
            color: #ff1493;
            border: 3px solid #ff69b4;
        }

        .option.stage-0:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }

        /* STAGE 1 - SLIGHTLY ODD */
        body.stage-1 {
            background: linear-gradient(135deg, #b8a3d9 0%, #8b7ab8 100%);
        }

        .container.stage-1 {
            background: linear-gradient(135deg, #b8a3d9 0%, #8b7ab8 100%);
        }

        .survey-wrapper.stage-1 {
            background: rgba(200, 180, 220, 0.95);
            box-shadow: 0 8px 32px rgba(139, 122, 184, 0.5);
            border: 3px solid #6a5acd;
            animation: glitch 0.4s ease-in-out;
        }

        .survey-wrapper.stage-1 h1 {
            color: #483d8b;
            font-size: clamp(2em, 6vw, 2.8em);
            margin-bottom: 15px;
        }

        .survey-wrapper.stage-1 p {
            color: #5a4a9a;
            font-size: clamp(1em, 2.5vw, 1.2em);
            margin-bottom: 30px;
        }

        .option.stage-1 {
            background: linear-gradient(135deg, #9370db 0%, #7a5fb8 100%);
            color: #2a1a6a;
            border: 3px solid #6a5acd;
        }

        .option.stage-1:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(106, 90, 205, 0.4);
        }

        /* STAGE 2 - GETTING DARKER */
        body.stage-2 {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
        }

        .container.stage-2 {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            filter: brightness(0.9) saturate(1.3);
        }

        .survey-wrapper.stage-2 {
            background: rgba(40, 40, 50, 0.96);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3), inset 0 0 20px rgba(255, 0, 0, 0.2);
            border: 3px solid #660000;
            animation: screenShake 0.5s ease-in-out;
        }

        .survey-wrapper.stage-2 h1 {
            color: #ff4444;
            font-size: clamp(1.9em, 6vw, 2.7em);
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        .survey-wrapper.stage-2 p {
            color: #ffaaaa;
            font-size: clamp(0.95em, 2.5vw, 1.1em);
            margin-bottom: 30px;
        }

        .option.stage-2 {
            background: linear-gradient(135deg, #441111 0%, #331111 100%);
            color: #ff6666;
            border: 3px solid #660000;
        }

        .option.stage-2:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(255, 0, 0, 0.4);
        }

        /* STAGE 3 - CREEPY */
        body.stage-3 {
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
        }

        .container.stage-3 {
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            filter: brightness(0.65) contrast(1.4);
        }

        .survey-wrapper.stage-3 {
            background: rgba(15, 15, 25, 0.97);
            box-shadow: 0 0 80px rgba(200, 0, 0, 0.7), inset 0 0 40px rgba(255, 0, 0, 0.4);
            border: 3px solid #800000;
            animation: distortion 0.6s ease-in-out;
        }

        .survey-wrapper.stage-3 h1 {
            color: #ff0000;
            font-size: clamp(1.8em, 6vw, 2.6em);
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(255, 0, 0, 1), 0 0 60px rgba(255, 0, 0, 0.6);
            font-weight: bold;
            letter-spacing: 3px;
        }

        .survey-wrapper.stage-3 p {
            color: #ff8888;
            font-size: clamp(0.9em, 2.5vw, 1em);
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .option.stage-3 {
            background: linear-gradient(135deg, #330000 0%, #220000 100%);
            color: #ff3333;
            border: 3px solid #800000;
        }

        .option.stage-3:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.7);
            background: linear-gradient(135deg, #550000 0%, #330000 100%);
        }

        /* STAGE 4 - VERY CREEPY */
        body.stage-4 {
            background: #000000;
        }

        .container.stage-4 {
            background: #000000;
            filter: brightness(0.55) contrast(1.6) saturate(1.5);
        }

        .survey-wrapper.stage-4 {
            background: rgba(10, 10, 15, 0.98);
            box-shadow: 0 0 120px rgba(200, 0, 0, 0.9), 0 0 200px rgba(255, 0, 0, 0.6), inset 0 0 50px rgba(255, 0, 0, 0.5);
            border: 3px solid #ff0000;
            animation: screenShake 0.7s ease-in-out;
        }

        .survey-wrapper.stage-4 h1 {
            color: #ff0000;
            font-size: clamp(1.7em, 6vw, 2.5em);
            margin-bottom: 15px;
            text-shadow: 0 0 40px rgba(255, 0, 0, 1), 0 0 80px rgba(255, 0, 0, 0.8);
            font-weight: bold;
            letter-spacing: 4px;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 40px rgba(255, 0, 0, 1), 0 0 80px rgba(255, 0, 0, 0.8);
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
                opacity: 0.7;
            }
        }

        .survey-wrapper.stage-4 p {
            color: #ff5555;
            font-size: clamp(0.85em, 2.5vw, 0.95em);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .option.stage-4 {
            background: linear-gradient(135deg, #1a0000 0%, #0d0000 100%);
            color: #ff2222;
            border: 3px solid #ff0000;
        }

        .option.stage-4:hover {
            transform: scale(1.06);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.9);
            background: linear-gradient(135deg, #330000 0%, #1a0000 100%);
        }

        /* STAGE 5 - FINAL CREEPY */
        body.stage-5 {
            background: #000000;
        }

        .container.stage-5 {
            background: #000000;
            filter: brightness(0.5) contrast(2) saturate(1.8);
        }

        .survey-wrapper.stage-5 {
            background: rgba(0, 0, 0, 0.99);
            box-shadow: 0 0 150px rgba(255, 0, 0, 1), 0 0 250px rgba(255, 0, 0, 0.8), inset 0 0 80px rgba(255, 0, 0, 0.6);
            border: 4px dashed #ff0000;
            animation: distortion 0.8s ease-in-out;
        }

        .survey-wrapper.stage-5 h1 {
            color: #ff0000;
            font-size: clamp(1.6em, 6vw, 2.4em);
            margin-bottom: 15px;
            text-shadow: 0 0 50px rgba(255, 0, 0, 1), 0 0 100px rgba(255, 0, 0, 0.9);
            font-weight: bold;
            letter-spacing: 5px;
            animation: pulse 0.25s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 50px rgba(255, 0, 0, 1), 0 0 100px rgba(255, 0, 0, 0.9);
            }
            50% {
                transform: scale(1.08);
                text-shadow: 0 0 80px rgba(255, 0, 0, 1), 0 0 150px rgba(255, 0, 0, 1);
            }
        }

        .survey-wrapper.stage-5 p {
            color: #ff3333;
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            margin-bottom: 30px;
            line-height: 2.2;
            letter-spacing: 2px;
        }

        .option.stage-5 {
            background: linear-gradient(135deg, #000000 0%, #0a0000 100%);
            color: #ff1111;
            border: 3px solid #ff0000;
        }

        .option.stage-5:hover {
            transform: scale(1.08);
            box-shadow: 0 0 80px rgba(255, 0, 0, 1);
            background: linear-gradient(135deg, #1a0000 0%, #0d0000 100%);
        }

        /* Common styles */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .option {
            padding: clamp(14px, 2.5vw, 20px) clamp(20px, 3vw, 35px);
            border-radius: 12px;
            cursor: pointer;
            font-size: clamp(0.9em, 2vw, 1.15em);
            transition: all 0.25s ease;
            border: none;
            font-weight: bold;
            width: 100%;
        }

        .option:active {
            transform: scale(0.96);
        }

        .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .end-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        progress {
            width: 100%;
            height: 8px;
            margin-bottom: 25px;
            border: none;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.25);
            transition: all 0.8s ease;
        }

        progress::-webkit-progress-bar {
            background-color: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
        }

        progress::-webkit-progress-value {
            background: linear-gradient(90deg, #ff69b4, #ff1111);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        progress::-moz-progress-bar {
            background: linear-gradient(90deg, #ff69b4, #ff1111);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .survey-wrapper {
                width: 90vw;
                padding: 30px 20px;
            }

            .options-container {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="survey-wrapper" id="surveyWrapper">
            <!-- Question will be injected here -->
        </div>
    </div>

    <audio id="soundEffect" preload="auto"></audio>

    <script>
        const questions = [
            {
                title: "Welcome! 👋",
                question: "What's your favorite color?",
                options: ["Red", "Blue", "Yellow", "Green"],
                stage: 0
            },
            {
                title: "Question 2 of 6",
                question: "Do you like being watched?",
                options: ["Yes", "No", "Sometimes", "Always"],
                stage: 1
            },
            {
                title: "Question 3 of 6",
                question: "What time do you usually sleep?",
                options: ["9 PM", "Midnight", "3 AM", "I don't sleep"],
                stage: 2
            },
            {
                title: "Question 4 of 6",
                question: "Do you feel like someone is behind you?",
                options: ["Yes", "No", "Maybe", "Right now"],
                stage: 3
            },
            {
                title: "Question 5 of 6",
                question: "How many times have you looked over your shoulder while reading this?",
                options: ["0 times", "1-2 times", "3-5 times", "I can't stop looking"],
                stage: 4
            },
            {
                title: "Question 6 of 6 - FINAL",
                question: "Are you sure you want to continue?",
                options: ["Yes", "No", "I'm not sure", "I'm scared"],
                stage: 5
            }
        ];

        let currentQuestion = 0;
        const container = document.getElementById('container');
        const surveyWrapper = document.getElementById('surveyWrapper');
        const soundEffect = document.getElementById('soundEffect');

        function updateStage(stage) {
            document.body.className = `stage-${stage}`;
            container.className = `stage-${stage}`;
            surveyWrapper.className = `survey-wrapper stage-${stage}`;
            
            const progressBar = document.querySelector('progress');
            if (progressBar) {
                progressBar.className = `stage-${stage}`;
            }
        }

        function renderQuestion(index) {
            if (index >= questions.length) {
                showEndScreen();
                return;
            }

            const q = questions[index];
            updateStage(q.stage);

            const progressPercent = ((index + 1) / questions.length) * 100;

            let creditsHTML = '';
            if (index === 0) {
                creditsHTML = '<div class="credits">Made By TapIsLit</div>';
            }

            surveyWrapper.innerHTML = `
                ${creditsHTML}
                <progress value="${progressPercent}" max="100"></progress>
                <h1>${q.title}</h1>
                <p>${q.question}</p>
                <div class="options-container">
                    ${q.options.map((option, i) => `
                        <button class="option stage-${q.stage}" onclick="nextQuestion(${index})">
                            ${option}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function nextQuestion(index) {
            currentQuestion++;
            renderQuestion(currentQuestion);
        }

        function showEndScreen() {
            // Hide everything
            container.style.display = 'none';

            // Create full screen video container
            const endScreen = document.createElement('div');
            endScreen.className = 'end-screen';

            const videoElement = document.createElement('video');
            videoElement.src = 'media/video.mp4';
            videoElement.controls = false;
            videoElement.autoplay = true;
            videoElement.muted = false;

            endScreen.appendChild(videoElement);
            document.body.appendChild(endScreen);

            // Play sound with video
            setTimeout(() => {
                if (soundEffect.src) {
                    soundEffect.currentTime = 0;
                    soundEffect.play().catch(() => {});
                }
            }, 200);
        }

        // Initialize
        renderQuestion(0);

        // Add your audio and video files here
        soundEffect.src = 'media/audio.mp3';
    </script>
</body>
</html>
