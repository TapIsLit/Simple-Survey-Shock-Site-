<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Survey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            transition: background 1s ease, filter 1s ease;
        }

        .survey-wrapper {
            text-align: center;
            width: 95vw;
            height: 95vh;
            padding: 5vh;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-8px, -8px); }
            20% { transform: translate(8px, 8px); }
            30% { transform: translate(-8px, 8px); }
            40% { transform: translate(8px, -8px); }
            50% { transform: translate(-6px, -6px); }
            60% { transform: translate(6px, 6px); }
            70% { transform: translate(-6px, 6px); }
            80% { transform: translate(6px, -6px); }
            90% { transform: translate(-4px, -4px); }
        }

        @keyframes glitch {
            0%, 100% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
            25% { clip-path: polygon(0% 5%, 100% 0%, 100% 95%, 0% 100%); }
            50% { clip-path: polygon(0% 0%, 100% 8%, 100% 100%, 0% 92%); }
            75% { clip-path: polygon(0% 3%, 100% 3%, 100% 97%, 0% 97%); }
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        @keyframes redPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 80px rgba(255, 0, 0, 1); }
        }

        /* STAGE 0 - CUTE */
        body.stage-0 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .container.stage-0 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .survey-wrapper.stage-0 {
            background: rgba(255, 255, 255, 0.99);
            border: 5px solid #ffb3d9;
            box-shadow: 0 0 40px rgba(255, 182, 211, 0.4);
        }

        .survey-wrapper.stage-0 h1 {
            color: #ff69b4;
            font-size: 3.5em;
            margin-bottom: 15px;
        }

        .survey-wrapper.stage-0 .credits {
            color: #ff85c0;
            font-size: 1em;
            margin-bottom: 20px;
            font-style: italic;
        }

        .survey-wrapper.stage-0 p {
            color: #ff85c0;
            font-size: 1.4em;
            margin-bottom: 40px;
        }

        .option.stage-0 {
            background: linear-gradient(135deg, #ffb3d9 0%, #ffc0e0 100%);
            color: #ff1493;
            border: 3px solid #ff69b4;
        }

        .option.stage-0:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.5);
        }

        /* STAGE 1 - SLIGHTLY ODD */
        body.stage-1 {
            background: linear-gradient(135deg, #b8a3d9 0%, #8b7ab8 100%);
        }

        .container.stage-1 {
            background: linear-gradient(135deg, #b8a3d9 0%, #8b7ab8 100%);
        }

        .survey-wrapper.stage-1 {
            background: rgba(200, 180, 220, 0.97);
            border: 5px solid #6a5acd;
            box-shadow: 0 0 50px rgba(106, 90, 205, 0.5);
            animation: shake 0.4s 1;
        }

        .survey-wrapper.stage-1 h1 {
            color: #483d8b;
            font-size: 3.2em;
            margin-bottom: 20px;
        }

        .survey-wrapper.stage-1 p {
            color: #5a4a9a;
            font-size: 1.3em;
            margin-bottom: 40px;
        }

        .option.stage-1 {
            background: linear-gradient(135deg, #9370db 0%, #7a5fb8 100%);
            color: #2a1a6a;
            border: 3px solid #6a5acd;
        }

        .option.stage-1:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(106, 90, 205, 0.6);
        }

        /* STAGE 2 - GETTING DARKER */
        body.stage-2 {
            background: #1a1a1a;
        }

        .container.stage-2 {
            background: #1a1a1a;
            filter: brightness(0.9) saturate(1.5);
        }

        .survey-wrapper.stage-2 {
            background: rgba(30, 30, 40, 0.98);
            border: 5px solid #660000;
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.5), inset 0 0 40px rgba(255, 0, 0, 0.2);
            animation: glitch 0.5s 1;
        }

        .survey-wrapper.stage-2 h1 {
            color: #ff4444;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        .survey-wrapper.stage-2 p {
            color: #ffbbbb;
            font-size: 1.2em;
            margin-bottom: 40px;
        }

        .option.stage-2 {
            background: linear-gradient(135deg, #441111 0%, #331111 100%);
            color: #ff6666;
            border: 3px solid #660000;
        }

        .option.stage-2:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(255, 0, 0, 0.6);
        }

        /* STAGE 3 - CREEPY */
        body.stage-3 {
            background: #000000;
        }

        .container.stage-3 {
            background: #000000;
            filter: brightness(0.6) contrast(1.5) saturate(1.8);
        }

        .survey-wrapper.stage-3 {
            background: rgba(10, 10, 15, 0.99);
            border: 5px solid #800000;
            box-shadow: 0 0 120px rgba(255, 0, 0, 0.8), inset 0 0 60px rgba(255, 0, 0, 0.4);
            animation: shake 0.5s 1;
        }

        .survey-wrapper.stage-3 h1 {
            color: #ff0000;
            font-size: 2.8em;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255, 0, 0, 1);
            letter-spacing: 4px;
        }

        .survey-wrapper.stage-3 p {
            color: #ff7777;
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .option.stage-3 {
            background: linear-gradient(135deg, #330000 0%, #220000 100%);
            color: #ff3333;
            border: 3px solid #800000;
        }

        .option.stage-3:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 40px rgba(255, 0, 0, 0.8);
        }

        /* STAGE 4 - VERY CREEPY */
        body.stage-4 {
            background: #000000;
        }

        .container.stage-4 {
            background: #000000;
            filter: brightness(0.5) contrast(2) saturate(2);
        }

        .survey-wrapper.stage-4 {
            background: rgba(5, 5, 10, 0.99);
            border: 5px solid #ff0000;
            box-shadow: 0 0 150px rgba(255, 0, 0, 1), inset 0 0 80px rgba(255, 0, 0, 0.6);
            animation: glitch 0.6s 1;
        }

        .survey-wrapper.stage-4 h1 {
            color: #ff0000;
            font-size: 2.6em;
            margin-bottom: 20px;
            text-shadow: 0 0 60px rgba(255, 0, 0, 1);
            letter-spacing: 5px;
            animation: flicker 0.1s infinite;
        }

        .survey-wrapper.stage-4 p {
            color: #ff4444;
            font-size: 1em;
            margin-bottom: 40px;
        }

        .option.stage-4 {
            background: linear-gradient(135deg, #1a0000 0%, #0d0000 100%);
            color: #ff1111;
            border: 4px solid #ff0000;
        }

        .option.stage-4:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(255, 0, 0, 1);
        }

        /* STAGE 5 - FINAL CREEPY */
        body.stage-5 {
            background: #000000;
        }

        .container.stage-5 {
            background: #000000;
            filter: brightness(0.4) contrast(2.5) saturate(2.5);
        }

        .survey-wrapper.stage-5 {
            background: rgba(0, 0, 0, 1);
            border: 5px dashed #ff0000;
            box-shadow: 0 0 200px rgba(255, 0, 0, 1), inset 0 0 100px rgba(255, 0, 0, 0.8);
            animation: shake 0.7s 1, redPulse 0.8s infinite;
        }

        .survey-wrapper.stage-5 h1 {
            color: #ff0000;
            font-size: 2.4em;
            margin-bottom: 20px;
            text-shadow: 0 0 80px rgba(255, 0, 0, 1), 0 0 150px rgba(255, 0, 0, 1);
            letter-spacing: 6px;
            animation: flicker 0.08s infinite;
        }

        .survey-wrapper.stage-5 p {
            color: #ff2222;
            font-size: 0.95em;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .option.stage-5 {
            background: linear-gradient(135deg, #0a0000 0%, #000000 100%);
            color: #ff0000;
            border: 4px solid #ff0000;
        }

        .option.stage-5:hover {
            transform: scale(1.12);
            box-shadow: 0 0 100px rgba(255, 0, 0, 1);
        }

        /* Common */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 600px;
        }

        .option {
            padding: 20px 40px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.2em;
            border: none;
            font-weight: bold;
            transition: all 0.25s ease;
            width: 100%;
        }

        .option:active {
            transform: scale(0.95);
        }

        progress {
            width: 90%;
            height: 10px;
            margin-bottom: 40px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.3);
        }

        progress::-webkit-progress-bar {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        progress::-webkit-progress-value {
            background: linear-gradient(90deg, #ff69b4, #ff0000);
            border-radius: 10px;
        }

        progress::-moz-progress-bar {
            background: linear-gradient(90deg, #ff69b4, #ff0000);
            border-radius: 10px;
        }

        .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .end-screen video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="survey-wrapper" id="surveyWrapper"></div>
    </div>

    <audio id="soundEffect"></audio>

    <script>
        const questions = [
            {
                title: "Welcome! 👋",
                question: "What's your favorite color?",
                options: ["Red", "Blue", "Yellow", "Green"],
                stage: 0
            },
            {
                title: "Question 2 of 6",
                question: "Do you like being watched?",
                options: ["Yes", "No", "Sometimes", "Always"],
                stage: 1
            },
            {
                title: "Question 3 of 6",
                question: "What time do you usually sleep?",
                options: ["9 PM", "Midnight", "3 AM", "I don't sleep"],
                stage: 2
            },
            {
                title: "Question 4 of 6",
                question: "Do you feel like someone is behind you?",
                options: ["Yes", "No", "Maybe", "Right now"],
                stage: 3
            },
            {
                title: "Question 5 of 6",
                question: "How many times have you looked over your shoulder?",
                options: ["0 times", "1-2 times", "3-5 times", "I can't stop looking"],
                stage: 4
            },
            {
                title: "Question 6 of 6 - FINAL",
                question: "Are you sure you want to continue?",
                options: ["Yes", "No", "I'm not sure", "I'm scared"],
                stage: 5
            }
        ];

        let currentQuestion = 0;
        const container = document.getElementById('container');
        const surveyWrapper = document.getElementById('surveyWrapper');
        const soundEffect = document.getElementById('soundEffect');
        soundEffect.src = 'media/audio.mp3';

        function updateStage(stage) {
            document.body.className = `stage-${stage}`;
            container.className = `stage-${stage}`;
            surveyWrapper.className = `survey-wrapper stage-${stage}`;
        }

        function renderQuestion(index) {
            if (index >= questions.length) {
                showEndScreen();
                return;
            }

            const q = questions[index];
            updateStage(q.stage);

            const progressPercent = ((index + 1) / questions.length) * 100;
            const creditsHTML = index === 0 ? '<div class="credits">Made By TapIsLit</div>' : '';

            surveyWrapper.innerHTML = `
                ${creditsHTML}
                <progress value="${progressPercent}" max="100"></progress>
                <h1>${q.title}</h1>
                <p>${q.question}</p>
                <div class="options-container">
                    ${q.options.map(() => `<button class="option stage-${q.stage}" onclick="nextQuestion()">Click</button>`).join('')}
                </div>
            `;

            surveyWrapper.querySelectorAll('.option').forEach((btn, i) => {
                btn.textContent = q.options[i];
            });
        }

        function nextQuestion() {
            currentQuestion++;
            renderQuestion(currentQuestion);
        }

        function showEndScreen() {
            const endScreen = document.createElement('div');
            endScreen.className = 'end-screen';
            
            const video = document.createElement('video');
            video.src = 'media/video.mp4';
            video.autoplay = true;
            video.muted = false;
            
            endScreen.appendChild(video);
            document.body.appendChild(endScreen);

            setTimeout(() => {
                soundEffect.play().catch(() => {});
            }, 300);
        }

        renderQuestion(0);
    </script>
</body>
</html>
