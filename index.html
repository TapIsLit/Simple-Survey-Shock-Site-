<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Survey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            transition: all 0.8s ease;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.8s ease, filter 0.8s ease;
        }

        .survey-wrapper {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            max-width: 90vw;
            max-height: 90vh;
            width: 100%;
            animation: slideIn 0.6s ease;
            transition: all 0.8s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* STAGE 0 - CUTE */
        body.stage-0 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .container.stage-0 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .survey-wrapper.stage-0 {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 32px rgba(252, 182, 159, 0.3);
            border: 3px solid #ffb3d9;
        }

        .survey-wrapper.stage-0 h1 {
            color: #ff69b4;
            font-size: clamp(1.8em, 5vw, 2.5em);
            margin-bottom: 20px;
        }

        .survey-wrapper.stage-0 p {
            color: #ff85c0;
            font-size: clamp(0.9em, 2.5vw, 1.1em);
            margin-bottom: 30px;
        }

        .option.stage-0 {
            background: linear-gradient(135deg, #ffb3d9 0%, #ffc0e0 100%);
            color: #ff1493;
            border: 2px solid #ff69b4;
        }

        .option.stage-0:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }

        /* STAGE 1 - SLIGHTLY ODD */
        body.stage-1 {
            background: linear-gradient(135deg, #b8a3d9 0%, #8b7ab8 100%);
        }

        .container.stage-1 {
            background: linear-gradient(135deg, #b8a3d9 0%, #8b7ab8 100%);
        }

        .survey-wrapper.stage-1 {
            background: rgba(200, 180, 220, 0.9);
            box-shadow: 0 8px 32px rgba(139, 122, 184, 0.5);
            border: 3px solid #6a5acd;
        }

        .survey-wrapper.stage-1 h1 {
            color: #483d8b;
            font-size: clamp(1.8em, 5vw, 2.3em);
            margin-bottom: 20px;
        }

        .survey-wrapper.stage-1 p {
            color: #5a4a9a;
            font-size: clamp(0.9em, 2.5vw, 1.05em);
            margin-bottom: 30px;
        }

        .option.stage-1 {
            background: linear-gradient(135deg, #9370db 0%, #7a5fb8 100%);
            color: #2a1a6a;
            border: 2px solid #6a5acd;
        }

        .option.stage-1:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(106, 90, 205, 0.4);
        }

        /* STAGE 2 - GETTING DARKER */
        body.stage-2 {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
        }

        .container.stage-2 {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            filter: brightness(0.95);
        }

        .survey-wrapper.stage-2 {
            background: rgba(40, 40, 50, 0.95);
            box-shadow: 0 8px 32px rgba(255, 0, 0, 0.2);
            border: 3px solid #660000;
        }

        .survey-wrapper.stage-2 h1 {
            color: #ff4444;
            font-size: clamp(1.8em, 5vw, 2.2em);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .survey-wrapper.stage-2 p {
            color: #ccaaaa;
            font-size: clamp(0.9em, 2.5vw, 1em);
            margin-bottom: 30px;
        }

        .option.stage-2 {
            background: linear-gradient(135deg, #441111 0%, #331111 100%);
            color: #ff6666;
            border: 2px solid #660000;
        }

        .option.stage-2:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.3);
        }

        /* STAGE 3 - CREEPY */
        body.stage-3 {
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
        }

        .container.stage-3 {
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            filter: brightness(0.8);
        }

        .survey-wrapper.stage-3 {
            background: rgba(20, 20, 30, 0.98);
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.6);
            border: 3px solid #800000;
        }

        .survey-wrapper.stage-3 h1 {
            color: #ff0000;
            font-size: clamp(1.8em, 5vw, 2.1em);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .survey-wrapper.stage-3 p {
            color: #ff9999;
            font-size: clamp(0.85em, 2.5vw, 0.95em);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .option.stage-3 {
            background: linear-gradient(135deg, #330000 0%, #220000 100%);
            color: #ff3333;
            border: 2px solid #800000;
        }

        .option.stage-3:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            background: linear-gradient(135deg, #550000 0%, #330000 100%);
        }

        /* STAGE 4 - VERY CREEPY */
        body.stage-4 {
            background: #000000;
        }

        .container.stage-4 {
            background: #000000;
            filter: brightness(0.7);
        }

        .survey-wrapper.stage-4 {
            background: rgba(10, 10, 20, 0.99);
            box-shadow: 0 0 60px rgba(200, 0, 0, 0.8);
            border: 3px solid #ff0000;
        }

        .survey-wrapper.stage-4 h1 {
            color: #ff0000;
            font-size: clamp(1.7em, 5vw, 2em);
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 0, 0, 1);
            font-weight: bold;
            letter-spacing: 3px;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 30px rgba(255, 0, 0, 1);
            }
            20%, 24%, 55% {
                text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            }
        }

        .survey-wrapper.stage-4 p {
            color: #ff6666;
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .option.stage-4 {
            background: linear-gradient(135deg, #1a0000 0%, #0d0000 100%);
            color: #ff2222;
            border: 2px solid #ff0000;
        }

        .option.stage-4:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
            background: linear-gradient(135deg, #330000 0%, #1a0000 100%);
        }

        /* STAGE 5 - FINAL CREEPY */
        body.stage-5 {
            background: #000000;
        }

        .container.stage-5 {
            background: #000000;
            filter: brightness(0.6) contrast(1.2);
        }

        .survey-wrapper.stage-5 {
            background: rgba(0, 0, 0, 1);
            box-shadow: 0 0 100px rgba(255, 0, 0, 1);
            border: 3px dashed #ff0000;
        }

        .survey-wrapper.stage-5 h1 {
            color: #ff0000;
            font-size: clamp(1.6em, 5vw, 1.9em);
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255, 0, 0, 1);
            font-weight: bold;
            letter-spacing: 4px;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 40px rgba(255, 0, 0, 1);
            }
            50% {
                transform: scale(1.02);
                text-shadow: 0 0 60px rgba(255, 0, 0, 1);
            }
        }

        .survey-wrapper.stage-5 p {
            color: #ff4444;
            font-size: clamp(0.75em, 2.5vw, 0.85em);
            margin-bottom: 30px;
            line-height: 2;
            letter-spacing: 1px;
        }

        .option.stage-5 {
            background: linear-gradient(135deg, #000000 0%, #0a0000 100%);
            color: #ff1111;
            border: 2px solid #ff0000;
        }

        .option.stage-5:hover {
            transform: scale(1.08);
            box-shadow: 0 0 50px rgba(255, 0, 0, 1);
            background: linear-gradient(135deg, #1a0000 0%, #0d0000 100%);
        }

        /* Common styles */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            justify-content: flex-start;
        }

        .option {
            padding: clamp(10px, 2vw, 15px) clamp(15px, 3vw, 25px);
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(0.85em, 2vw, 1em);
            transition: all 0.3s ease;
            border: none;
            font-weight: bold;
            width: 100%;
        }

        .option:active {
            transform: scale(0.98);
        }

        .credit {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: clamp(0.7em, 1.5vw, 0.85em);
            opacity: 0.7;
            transition: all 0.8s ease;
        }

        .credit.stage-0 {
            color: #ff69b4;
        }

        .credit.stage-1 {
            color: #6a5acd;
        }

        .credit.stage-2 {
            color: #ff4444;
        }

        .credit.stage-3 {
            color: #ff0000;
        }

        .credit.stage-4 {
            color: #ff0000;
        }

        .credit.stage-5 {
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }

        .end-screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .end-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
            margin: 0;
            box-shadow: none;
        }

        progress {
            width: 100%;
            height: 6px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.2);
            transition: all 0.8s ease;
        }

        progress::-webkit-progress-bar {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        progress::-webkit-progress-value {
            background: linear-gradient(90deg, #ff69b4, #ff0000);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        progress::-moz-progress-bar {
            background: linear-gradient(90deg, #ff69b4, #ff0000);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .survey-wrapper {
                padding: 30px 20px;
            }

            .options-container {
                gap: 12px;
            }

            .option {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="survey-wrapper" id="surveyWrapper">
            <!-- Question will be injected here -->
        </div>
    </div>

    <audio id="soundEffect" preload="auto"></audio>
    <video id="endVideo" preload="auto"></video>

    <script>
        const questions = [
            {
                title: "Welcome! 👋",
                question: "What's your favorite color?",
                options: ["Red", "Blue", "Yellow", "Green"],
                stage: 0
            },
            {
                title: "Question 2 of 6",
                question: "Do you like being watched?",
                options: ["Yes", "No", "Sometimes", "Always"],
                stage: 1
            },
            {
                title: "Question 3 of 6",
                question: "What time do you usually sleep?",
                options: ["9 PM", "Midnight", "3 AM", "I don't sleep"],
                stage: 2
            },
            {
                title: "Question 4 of 6",
                question: "Do you feel like someone is behind you?",
                options: ["Yes", "No", "Maybe", "Right now"],
                stage: 3
            },
            {
                title: "Question 5 of 6",
                question: "How many times have you looked over your shoulder while reading this?",
                options: ["0 times", "1-2 times", "3-5 times", "I can't stop looking"],
                stage: 4
            },
            {
                title: "Question 6 of 6 - FINAL",
                question: "Are you sure you want to continue?",
                options: ["Yes", "No", "I'm not sure", "I'm scared"],
                stage: 5
            }
        ];

        let currentQuestion = 0;
        const container = document.getElementById('container');
        const surveyWrapper = document.getElementById('surveyWrapper');
        const soundEffect = document.getElementById('soundEffect');
        const endVideo = document.getElementById('endVideo');

        // Create credit element
        const credit = document.createElement('div');
        credit.className = 'credit stage-0';
        credit.textContent = 'Made By TapIsLit';
        document.body.appendChild(credit);

        function updateStage(stage) {
            document.body.className = `stage-${stage}`;
            container.className = `stage-${stage}`;
            surveyWrapper.className = `survey-wrapper stage-${stage}`;
            credit.className = `credit stage-${stage}`;
            
            const progressBar = document.querySelector('progress');
            if (progressBar) {
                progressBar.className = `stage-${stage}`;
            }
        }

        function renderQuestion(index) {
            if (index >= questions.length) {
                showEndScreen();
                return;
            }

            const q = questions[index];
            updateStage(q.stage);

            const progressPercent = ((index + 1) / questions.length) * 100;

            surveyWrapper.innerHTML = `
                <progress value="${progressPercent}" max="100"></progress>
                <h1>${q.title}</h1>
                <p>${q.question}</p>
                <div class="options-container">
                    ${q.options.map((option, i) => `
                        <button class="option stage-${q.stage}" onclick="nextQuestion(${index})">
                            ${option}
                        </button>
                    `).join('')}
                </div>
            `;

            if (q.stage >= 3) {
                addCreepyEffects(q.stage);
            }
        }

        function nextQuestion(index) {
            const stage = questions[index].stage;
            if (stage >= 3) {
                surveyWrapper.style.animation = 'none';
                setTimeout(() => {
                    surveyWrapper.style.animation = 'slideIn 0.6s ease';
                }, 10);
            }

            currentQuestion++;
            renderQuestion(currentQuestion);
        }

        function addCreepyEffects(stage) {
            if (stage >= 4 && Math.random() > 0.7) {
                const tilt = (Math.random() - 0.5) * 2;
                surveyWrapper.style.transform = `rotate(${tilt}deg)`;
            }

            if (stage === 5) {
                surveyWrapper.style.animation = 'pulse 0.5s infinite';
            }
        }

        function showEndScreen() {
            // Clear everything and show full screen video
            container.style.background = '#000000';
            container.style.filter = 'none';
            surveyWrapper.style.display = 'none';
            credit.style.display = 'none';

            // Create full screen video container
            const videoContainer = document.createElement('div');
            videoContainer.className = 'end-screen';
            videoContainer.style.position = 'fixed';
            videoContainer.style.top = '0';
            videoContainer.style.left = '0';
            videoContainer.style.width = '100%';
            videoContainer.style.height = '100%';
            videoContainer.style.background = '#000000';
            videoContainer.style.zIndex = '9999';

            const videoElement = document.createElement('video');
            videoElement.src = 'media/video.mp4';
            videoElement.controls = false;
            videoElement.autoplay = true;
            videoElement.style.width = '100%';
            videoElement.style.height = '100%';
            videoElement.style.objectFit = 'cover';

            videoContainer.appendChild(videoElement);
            document.body.appendChild(videoContainer);

            // Play sound
            if (soundEffect.src) {
                soundEffect.currentTime = 0;
                soundEffect.play().catch(() => {});
            }
        }

        // Initialize
        renderQuestion(0);

        // Add your audio and video files here
        soundEffect.src = 'media/audio.mp3';
        endVideo.src = 'media/video.mp4';
    </script>
</body>
</html>
